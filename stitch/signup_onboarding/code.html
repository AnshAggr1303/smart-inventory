<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding | Smart Inventory</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Inter+Mono:wght@100..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#e3e3d9",
              "inverse-primary": "#c0c1ff",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#2a1700",
              "inverse-on-surface": "#f2f1e7",
              "outline-variant": "#c6c4d9",
              "secondary": "#5356a8",
              "secondary-container": "#a3a6fe",
              "surface-container-low": "#f5f4ea",
              "on-primary": "#ffffff",
              "surface-bright": "#fafaef",
              "primary-fixed-dim": "#c0c1ff",
              "primary": "#1e0cde",
              "surface-container": "#efeee4",
              "surface-tint": "#403ff6",
              "tertiary-fixed-dim": "#ffb95f",
              "secondary-fixed": "#e1e0ff",
              "inverse-surface": "#30312a",
              "surface-dim": "#dbdbd0",
              "on-secondary-fixed-variant": "#3b3d8e",
              "surface-container-high": "#e9e9de",
              "background": "#fafaef",
              "on-primary-fixed-variant": "#2215e0",
              "error-container": "#ffdad6",
              "surface": "#fafaef",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#c0c1ff",
              "on-tertiary-fixed-variant": "#653e00",
              "on-background": "#1b1c16",
              "tertiary-fixed": "#ffddb8",
              "on-secondary-container": "#363788",
              "on-tertiary-container": "#ffcb8f",
              "primary-container": "#3d3bf3",
              "outline": "#767588",
              "tertiary-container": "#825100",
              "surface-container-lowest": "#ffffff",
              "tertiary": "#623c00",
              "error": "#ba1a1a",
              "on-secondary-fixed": "#0b0763",
              "primary-fixed": "#e1e0ff",
              "on-surface-variant": "#454556",
              "surface-variant": "#e3e3d9",
              "on-primary-container": "#d1d0ff",
              "on-surface": "#1b1c16",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#07006c"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["Inter Mono"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAEF;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6">
<!-- Onboarding Container -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl p-8 shadow-[0_12px_32px_-4px_rgba(27,28,22,0.06)] ring-1 ring-outline-variant/15">
<!-- Step Indicator -->
<header class="flex flex-col items-center mb-8">
<div class="flex gap-2 mb-4">
<div class="w-2 h-2 rounded-full bg-primary-fixed"></div>
<div class="w-6 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed"></div>
</div>
<p class="text-[10px] uppercase tracking-wider font-semibold text-on-surface-variant">Step 2 of 3</p>
</header>
<!-- Form Content -->
<section class="space-y-6">
<div class="text-center space-y-1">
<h1 class="text-2xl font-bold text-on-surface tracking-tight">What kind of business do you run?</h1>
<p class="text-sm text-on-surface-variant">We'll set up templates that fit you.</p>
</div>
<!-- Industry Grid -->
<div class="grid grid-cols-2 gap-3">
<!-- Restaurant (Selected) -->
<button class="flex flex-col items-start p-4 text-left border-2 border-primary-container bg-primary-fixed rounded-xl transition-all duration-200">
<span class="material-symbols-outlined text-primary-container mb-2 text-3xl" data-icon="restaurant">restaurant</span>
<p class="text-sm font-semibold text-on-surface">Restaurant / Cloud Kitchen</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Manage menus, fresh stock, and wastage.</p>
</button>
<!-- Pharmacy -->
<button class="flex flex-col items-start p-4 text-left border border-transparent bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary mb-2 text-3xl" data-icon="medical_services">medical_services</span>
<p class="text-sm font-semibold text-on-surface">Pharmacy</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Track expiry dates and batch numbers.</p>
</button>
<!-- Retail / Kirana -->
<button class="flex flex-col items-start p-4 text-left border border-transparent bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary mb-2 text-3xl" data-icon="storefront">storefront</span>
<p class="text-sm font-semibold text-on-surface">Retail / Kirana</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Barcode scanning and shelf management.</p>
</button>
<!-- Hotel -->
<button class="flex flex-col items-start p-4 text-left border border-transparent bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary mb-2 text-3xl" data-icon="hotel">hotel</span>
<p class="text-sm font-semibold text-on-surface">Hotel</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Linen, toiletries, and room amenities.</p>
</button>
<!-- Manufacturing -->
<button class="flex flex-col items-start p-4 text-left border border-transparent bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary mb-2 text-3xl" data-icon="factory">factory</span>
<p class="text-sm font-semibold text-on-surface">Manufacturing</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Raw materials and assembly line items.</p>
</button>
<!-- Other -->
<button class="flex flex-col items-start p-4 text-left border border-transparent bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all duration-200 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary mb-2 text-3xl" data-icon="more_horiz">more_horiz</span>
<p class="text-sm font-semibold text-on-surface">Other</p>
<p class="text-[11px] text-on-surface-variant leading-tight mt-1">Custom fields for unique operations.</p>
</button>
</div>
<!-- Text Inputs -->
<div class="space-y-4 pt-2">
<div class="space-y-1.5">
<label class="text-[10px] uppercase tracking-wider font-semibold text-on-surface-variant px-1">Business name</label>
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg px-4 text-sm focus:ring-2 focus:ring-primary-fixed placeholder:text-outline transition-all" placeholder="e.g. The Silver Spoon" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] uppercase tracking-wider font-semibold text-on-surface-variant px-1">City / Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl" data-icon="location_on">location_on</span>
<input class="w-full h-12 bg-surface-container-low border-none rounded-lg pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary-fixed placeholder:text-outline transition-all" placeholder="Search city..." type="text"/>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-lg shadow-sm hover:translate-y-[-1px] hover:shadow-[0_4px_12px_rgba(30,12,222,0.2)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Continue</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</section>
<!-- Footer Help -->
<footer class="mt-8 pt-6 border-t border-outline-variant/15 text-center">
<p class="text-xs text-on-surface-variant">Need help deciding? <a class="text-primary font-medium hover:underline" href="#">Contact our setup team</a></p>
</footer>
</main>
<!-- Background Decoration (Subtle Tonal Shapes) -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-fixed/30 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary-fixed/20 blur-[120px] rounded-full"></div>
</div>
</body></html>
